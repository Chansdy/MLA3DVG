__base__:
  - __base__/base.yaml
  - __base__/accelerator.yaml
  - __base__/hub.yaml
  - __base__/mono3drefer_dataset.yaml

# Accelerator
with_tracking: False
report_to: 'wandb'
project_name: 'mla3dvg'

# Dataset
dataset:
  root_dir: './Mono3DRefer/'

model:
  num_labels: 9

  # Backbone
  use_timm_backbone: True
  backbone: 'swin_large_patch4_window7_224'
  pretrained_backbone_path: 'pretrained-models/swin_large_patch4_window7_224/model.safetensors'
  num_feature_levels: 4

  # Text Encoder
  text_encoder_type: 'pretrained-models/roberta-base'
  num_text_output_layers: 6

  # Vision-Language Encoder
  vl_encoder_type: 'simple-bridge-tower'
  
  # Transformer
  with_box_refine: True
  two_stage: False
  use_dab: True
  # encoder_layers: 6
  encoder_layers: 6
  decoder_layers: 3
  d_model: 256
  encoder_ffn_dim: 256
  decoder_ffn_dim: 256
  num_queries: 1
  decoder_self_attn: False
  decoder_depth_residual: False
  decoder_text_residual: False
  use_text_guided_adapter: True

learning_rate: 1.0e-5
lr_scheduler:
  type: cosine
  num_warmup_steps: 500

# Training
output_dir: outputs/
dataloader_num_workers: 1
train_batch_size: &batch_size 4
valid_batch_size: 2
test_batch_size: 1
pretrain_model: 'outputs/checkpoints/best'
#pretrain_model: 'pretrained-models/mono3dvg/checkpoint_best.pth'
